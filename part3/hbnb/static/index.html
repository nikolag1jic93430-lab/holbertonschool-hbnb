<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - List of Places</title>
    <link rel="icon" href="images/icon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="HBnB Logo" class="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
            <a href="#" id="logout-link" class="login-button" onclick="logout()" style="display:none;">Logout</a>
        </nav>
    </header>

    <main>
        <section id="filter" style="text-align: left; padding: 20px 40px;">
            <label for="country-filter">Filter by Country:</label>
            <select id="country-filter">
                <option value="all">All Countries</option>
                <option value="United States">United States</option>
                <option value="France">France</option>
                <option value="Japan">Japan</option>
            </select>
        </section>

        <section id="places-list" class="places-list">
            </section>
    </main>

    <footer>
        <p>&copy; 2026 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
