<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Place Details</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="HBnB Logo" class="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </nav>
    </header>

    <main>
        <section id="place-details">
            <p>Loading details...</p>
            
            <div class="amenities" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee;">
                <ul style="list-style: none; display: flex; gap: 15px; padding: 0;">
                    <li style="display: flex; align-items: center; gap: 8px; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 0.9rem;">
                        <img src="images/icon_wifi.png" alt="Wi-Fi" style="width: 20px; height: 20px;">
                        Wi-Fi
                    </li>
                    <li style="display: flex; align-items: center; gap: 8px; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 0.9rem;">
                        <img src="images/icon_bed.png" alt="Bed" style="width: 20px; height: 20px;">
                        Bed
                    </li>
                    <li style="display: flex; align-items: center; gap: 8px; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 0.9rem;">
                        <img src="images/icon_bath.png" alt="Bath" style="width: 20px; height: 20px;">
                        Bath
                    </li>
                </ul>
            </div>
        </section>

        <section id="reviews">
            <h2>Reviews</h2>
            <div id="reviews-container"></div>
        </section>

        <section id="add-review" style="display: none; text-align: center; margin-top: 30px;">
            <a href="#" id="add-review-link" style="display: inline-block; width: 150px; background-color: #007bff; color: white; padding: 10px 0; text-align: center; text-decoration: none; border-radius: 6px; font-size: 1rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.2);">Add Review</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
