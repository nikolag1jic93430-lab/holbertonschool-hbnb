<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBnB - Place Details</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="HBnB Logo" class="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </nav>
    </header>

    <main>
        <!-- Section pour les détails du logement -->
        <section id="place-details">
            <p>Loading details...</p>
        </section>

        <!-- Section pour les avis existants -->
        <section id="reviews">
            <h2>Reviews</h2>
            <div id="reviews-container"></div>
        </section>

        <!-- Section pour ajouter un avis (cachée par défaut) -->
        <section id="add-review" style="display: none;">
            <a href="#" id="add-review-link" class="details-button">Add Review</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 HBnB. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
